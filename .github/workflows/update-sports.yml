name: Update Sports Database

on:
  workflow_dispatch:
    inputs:
      sport:
        description: Choose a sport to update
        required: true
        default: all
        type: choice
        options:
          - all
          - mlb
          - wnba
          - nba
          - nfl
          - soccer
          - tennis
          - nhl

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create environment file
        shell: bash
        run: |
          {
            echo "FOOTBALL_DATA_TOKEN=${{ secrets.FOOTBALL_DATA_TOKEN }}"
            echo "TENNIS_API_KEY=${{ secrets.TENNIS_API_KEY }}"
            echo "PANDASCORE_API_KEY=${{ secrets.PANDASCORE_API_KEY }}"
            echo "MLB_API_KEY=${{ secrets.MLB_API_KEY }}"
          } > .env

      - name: Run selected sports update
        run: |
          python update_all.py --sport "${{ inputs.sport }}"

      - name: Validate generated data
        if: ${{ inputs.sport == 'all' }}
        run: |
          python validate_data.py

      - name: Generate health report
        run: |
          python health_report.py | tee health-report.txt

      - name: Package generated database
        if: always()
        shell: bash
        run: |
          mkdir -p artifact-output

          if [ -f data/sports.db ]; then
            cp data/sports.db artifact-output/
          fi

          if [ -d data/exports ]; then
            cp -r data/exports artifact-output/
          fi

          if [ -d data/mlb ]; then
            cp -r data/mlb artifact-output/
          fi

          if [ -d data/wnba ]; then
            cp -r data/wnba artifact-output/
          fi

          if [ -d logs ]; then
            cp -r logs artifact-output/
          fi

          if [ -f health-report.txt ]; then
            cp health-report.txt artifact-output/
          fi

      - name: Upload sports database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sports-database-${{ inputs.sport }}-${{ github.run_number }}
          path: artifact-output/
          retention-days: 14
          if-no-files-found: warn
