name: Update Sports Database

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update all sports
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          TENNIS_API_KEY: ${{ secrets.TENNIS_API_KEY }}
        run: python update_all.py

      - name: Commit changed data
        run: |
          git config user.name "sports-data-bot"
          git config user.email "sports-data-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Auto-update sports data"
          git push