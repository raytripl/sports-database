name: Update Sports Database

on:
  workflow_dispatch:
    inputs:
      sport:
        description: Choose a sport
        required: true
        default: all
        type: choice
        options:
          - all
          - mlb
          - wnba
          - nba
          - nfl
          - nhl
          - ncaab
          - ncaaf
          - tennis
          - soccer
          - golf
          - mma
          - nascar

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update selected sport
        env:
          SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          TENNIS_API_KEY: ${{ secrets.TENNIS_API_KEY }}
        run: |
          python update_all.py --sport "${{ inputs.sport }}"

      - name: Commit updated database files
        run: |
          git config user.name "sports-database-bot"
          git config user.email "sports-database-bot@users.noreply.github.com"

          git add data logs

          if git diff --cached --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "Update sports databases"
            git push
          fi
