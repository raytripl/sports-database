name: Update Sports Database

on:
  workflow_dispatch:
  schedule:
    # 6:15 AM UTC = 1:15 AM Central during standard time,
    # and 12:15 AM Central during daylight time.
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update all sports
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
        run: python update_all.py

      - name: Commit changed data
        run: |
          git config user.name "sports-data-bot"
          git config user.email "sports-data-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Auto-update sports data"
          git push
